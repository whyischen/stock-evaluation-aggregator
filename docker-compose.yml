services:
  sea-core:
    build:
      context: .
      dockerfile: Dockerfile.core
    image: sea-core:local
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SEA_TRADINGAGENTS_CN_URL: http://tradingagents-cn-svc:8080
      SEA_TRADINGAGENTS_URL: http://tradingagents-svc:8080
      SEA_ENABLE_MOCK_PLUGINS: ${SEA_ENABLE_MOCK_PLUGINS:-true}
      SEA_DB_PATH: /data/sea.sqlite3
    volumes:
      - sea_data:/data
    depends_on:
      - tradingagents-cn-svc
      - tradingagents-svc

  tradingagents-cn-svc:
    build:
      context: .
      dockerfile: Dockerfile.tradingagents-cn
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
        TRADINGAGENTS_CN_REF: ${TRADINGAGENTS_CN_REF:-main}
    image: sea-plugin-tradingagents-cn:local
    command: ["uvicorn", "plugins.service:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env
    environment:
      SEA_PLUGIN_SERVICE_ID: tradingagents_cn
      SEA_ENABLE_LIVE_TRADINGAGENTS: ${SEA_ENABLE_LIVE_TRADINGAGENTS:-false}
      SEA_TRADINGAGENTS_CN_TIMEOUT_SECONDS: ${SEA_TRADINGAGENTS_CN_TIMEOUT_SECONDS:-300}
      SEA_TRADINGAGENTS_ALL_CONFIG_JSON: ${SEA_TRADINGAGENTS_ALL_CONFIG_JSON:-}
      SEA_TRADINGAGENTS_CN_CONFIG_JSON: ${SEA_TRADINGAGENTS_CN_CONFIG_JSON:-}
      SEA_TRADINGAGENTS_CN_CONFIG__QUICK_PROVIDER: ${SEA_TRADINGAGENTS_CN_CONFIG__QUICK_PROVIDER:-}
      SEA_TRADINGAGENTS_CN_CONFIG__DEEP_PROVIDER: ${SEA_TRADINGAGENTS_CN_CONFIG__DEEP_PROVIDER:-}
      SEA_TRADINGAGENTS_CN_CONFIG__QUICK_API_KEY: ${SEA_TRADINGAGENTS_CN_CONFIG__QUICK_API_KEY:-}
      SEA_TRADINGAGENTS_CN_CONFIG__DEEP_API_KEY: ${SEA_TRADINGAGENTS_CN_CONFIG__DEEP_API_KEY:-}
      SEA_TRADINGAGENTS_CN_CONFIG__QUICK_MODEL: ${SEA_TRADINGAGENTS_CN_CONFIG__QUICK_MODEL:-}
      SEA_TRADINGAGENTS_CN_CONFIG__DEEP_MODEL: ${SEA_TRADINGAGENTS_CN_CONFIG__DEEP_MODEL:-}
      DEFAULT_CHINA_DATA_SOURCE: ${DEFAULT_CHINA_DATA_SOURCE:-akshare}
      CHINA_STOCK_DATA_SOURCE: ${CHINA_STOCK_DATA_SOURCE:-akshare}
      AKSHARE_TIMEOUT: ${AKSHARE_TIMEOUT:-30}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN:-}
      BAOSTOCK_CACHE_DIR: ${BAOSTOCK_CACHE_DIR:-/data/baostock}
      MONGODB_HOST: ${MONGODB_HOST:-tradingagents-cn-mongodb}
      MONGODB_PORT: ${MONGODB_PORT:-27017}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-tradingagents_cn}
      MONGODB_USERNAME: ${MONGODB_USERNAME:-}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-}
      MONGODB_URI: ${MONGODB_URI:-mongodb://tradingagents-cn-mongodb:27017/tradingagents_cn}
      REDIS_HOST: ${REDIS_HOST:-tradingagents-cn-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
    volumes:
      - tradingagents_cn_data:/data
    depends_on:
      tradingagents-cn-mongodb:
        condition: service_healthy
      tradingagents-cn-redis:
        condition: service_healthy

  tradingagents-svc:
    build:
      context: .
      dockerfile: Dockerfile.tradingagents
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-docker.m.daocloud.io/library/python:3.12-slim}
    image: sea-plugin-tradingagents:local
    command: ["uvicorn", "plugins.service:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file:
      - .env
    environment:
      SEA_PLUGIN_SERVICE_ID: tradingagents
      SEA_ENABLE_LIVE_TRADINGAGENTS: ${SEA_ENABLE_LIVE_TRADINGAGENTS:-false}
      SEA_TRADINGAGENTS_TIMEOUT_SECONDS: ${SEA_TRADINGAGENTS_TIMEOUT_SECONDS:-300}
      SEA_TRADINGAGENTS_ALL_CONFIG_JSON: ${SEA_TRADINGAGENTS_ALL_CONFIG_JSON:-}
      SEA_TRADINGAGENTS_CONFIG_JSON: ${SEA_TRADINGAGENTS_CONFIG_JSON:-}
      SEA_TRADINGAGENTS_CONFIG__LLM_PROVIDER: ${SEA_TRADINGAGENTS_CONFIG__LLM_PROVIDER:-}
      SEA_TRADINGAGENTS_CONFIG__BACKEND_URL: ${SEA_TRADINGAGENTS_CONFIG__BACKEND_URL:-}
      SEA_TRADINGAGENTS_CONFIG__DEEP_THINK_LLM: ${SEA_TRADINGAGENTS_CONFIG__DEEP_THINK_LLM:-}
      SEA_TRADINGAGENTS_CONFIG__QUICK_THINK_LLM: ${SEA_TRADINGAGENTS_CONFIG__QUICK_THINK_LLM:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}

  tradingagents-cn-mongodb:
    image: docker.m.daocloud.io/library/mongo:7
    restart: unless-stopped
    volumes:
      - tradingagents_cn_mongodb:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  tradingagents-cn-redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - tradingagents_cn_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sea_data:
  tradingagents_cn_data:
  tradingagents_cn_mongodb:
  tradingagents_cn_redis:
